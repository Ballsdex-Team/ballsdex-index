name: Validate cogs.json

on:
  pull_request:
    paths:
      - "data/cogs.json"

jobs:
  validate:
    name: Check cogs.json is valid JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -c "import json, sys; json.load(open('data/cogs.json')); print('cogs.json is valid JSON')"
